version: 2

project_name: assistant

before:
  hooks:
    - go mod tidy

builds:
  - id: assistant
    main: ./cmd/assistant
    binary: assistant
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gratefulagents/assistant/internal/assistant.buildVersion={{ .Version }}
      - -X github.com/gratefulagents/assistant/internal/assistant.buildCommit={{ .FullCommit }}
      - -X github.com/gratefulagents/assistant/internal/assistant.buildDate={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: assistant
    builds:
      - assistant
    format: binary
    name_template: '{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ if eq .Os "windows" }}.exe{{ end }}'

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

dockers:
  - image_templates:
      - "ghcr.io/gratefulagents/assistant:{{ .Tag }}-amd64"
      - "ghcr.io/gratefulagents/assistant:{{ .Version }}-amd64"
      - "ghcr.io/gratefulagents/assistant:latest-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    ids:
      - assistant
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.name={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/gratefulagents/assistant"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - image_templates:
      - "ghcr.io/gratefulagents/assistant:{{ .Tag }}-arm64"
      - "ghcr.io/gratefulagents/assistant:{{ .Version }}-arm64"
      - "ghcr.io/gratefulagents/assistant:latest-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    ids:
      - assistant
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.name={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/gratefulagents/assistant"
      - "--label=org.opencontainers.image.version={{ .Version }}"

docker_manifests:
  - name_template: "ghcr.io/gratefulagents/assistant:{{ .Tag }}"
    image_templates:
      - "ghcr.io/gratefulagents/assistant:{{ .Tag }}-amd64"
      - "ghcr.io/gratefulagents/assistant:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/gratefulagents/assistant:{{ .Version }}"
    image_templates:
      - "ghcr.io/gratefulagents/assistant:{{ .Version }}-amd64"
      - "ghcr.io/gratefulagents/assistant:{{ .Version }}-arm64"
  - name_template: "ghcr.io/gratefulagents/assistant:latest"
    image_templates:
      - "ghcr.io/gratefulagents/assistant:latest-amd64"
      - "ghcr.io/gratefulagents/assistant:latest-arm64"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"

release:
  mode: keep-existing
  replace_existing_artifacts: true
