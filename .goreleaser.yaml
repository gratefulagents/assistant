version: 2

project_name: assistant

before:
  hooks:
    - go mod tidy

builds:
  - id: assistant
    main: ./cmd/assistant
    binary: assistant
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gratefulagents/assistant/internal/assistant.buildVersion={{ .Version }}
      - -X github.com/gratefulagents/assistant/internal/assistant.buildCommit={{ .FullCommit }}
      - -X github.com/gratefulagents/assistant/internal/assistant.buildDate={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: assistant
    ids:
      - assistant
    formats:
      - binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ .ArtifactExt }}"

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"

release:
  mode: keep-existing
  replace_existing_artifacts: true
