name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build versioned binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          short_sha="${GITHUB_SHA::12}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath \
            -ldflags "-X github.com/gratefulagents/assistant/internal/assistant.buildVersion=ci-${short_sha} -X github.com/gratefulagents/assistant/internal/assistant.buildCommit=${GITHUB_SHA} -X github.com/gratefulagents/assistant/internal/assistant.buildDate=${build_date}" \
            -o dist/assistant ./cmd/assistant

          ./dist/assistant version
